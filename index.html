<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website Layout</title>
    <style>
        /* Base Reset & Layout Styles */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f4f4f9;
        }

        .main-container {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Content and Card Boxes */
        .content-box, .description-box {
            background: #ffffff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        /* Video Container - Updated to Rectangle */
        .video-container {
            width: 100%;
            aspect-ratio: 16 / 9; /* Standard widescreen rectangle ratio */
            background-color: #000;
            border-radius: 6px;
            overflow: hidden;
            margin-bottom: 15px;
        }

        .video-container video, 
        .video-container iframe {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border: none;
        }

        /* Secondary Placeholder Box */
        .empty-box {
            background: #e2e8f0;
            padding: 20px;
            border-radius: 8px;
            margin-top: 20px;
            min-height: 150px;
        }
    </style>
</head>
<body>

    <div class="main-container">
        <!-- Left Column: Video and Description -->
        <div class="content-box">
            <div class="video-container">
                <!-- Replace src with your video link or use a video tag -->
                <iframe src="https://www.youtube.com/embed/your-video-id" allowfullscreen></iframe>
            </div>
            <div class="description-box">
                <h2>Documentation Overview</h2>
                <p>This section outlines the details and instructions for the current project implementation.</p>
            </div>
        </div>

        <!-- Right Column: Additional Content / Empty Box -->
        <div class="sidebar-box">
            <div class="empty-box">
                <h3>Additional Notes</h3>
                <p>Placeholder content container.</p>
            </div>
        </div>
    </div>

</body>
</html>
