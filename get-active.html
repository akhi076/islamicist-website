<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get Active - islamicist</title>

    <!-- Reliable UMD bundle setup for Globe.gl and Three.js -->
    <script src="https://unpkg.com/three"></script>
    <script src="https://unpkg.com/globe.gl"></script>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background:black;
            color:white;
        }

        nav{
            position:fixed;
            width:100%;
            padding:20px 50px;
            display:flex;
            justify-content:space-between;
            align-items: center;
            background: #1a1a1a;
            z-index:1000;
            border-bottom: 1px solid #333;
        }

        .logo-btn {
            background: none;
            border: none;
            cursor: pointer;
            color: white;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s ease;
        }

        .logo-btn:hover {
            transform: scale(1.1);
        }

        .menu-btn {
            background: none;
            border: none;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            width: 28px;
            height: 20px;
            padding: 0;
            z-index: 1001;
        }

        .menu-btn span {
            display: block;
            width: 100%;
            height: 2px;
            background-color: white;
            transition: all 0.3s ease;
        }

        .side-menu-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 2500;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .side-menu-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .side-menu {
            position: fixed;
            top: 0;
            right: -350px;
            width: 350px;
            height: 100%;
            background: #141414;
            border-left: 1px solid #333;
            z-index: 2600;
            box-shadow: -5px 0 25px rgba(0,0,0,0.8);
            transition: right 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            padding: 30px;
        }

        .side-menu.active {
            right: 0;
        }

        .side-menu-header {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 20px;
        }

        .side-menu-close {
            background: none;
            border: none;
            color: #aaa;
            font-size: 28px;
            cursor: pointer;
            transition: color 0.2s;
        }

        .side-menu-close:hover {
            color: #fff;
        }

        .side-menu-links {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            flex-grow: 1;
            padding: 20px 0 40px 0;
            overflow-y: auto;
            text-align: center;
        }

        .side-menu-links a {
            color: #ddd;
            text-decoration: none;
            font-size: 1.1rem;
            font-weight: 500;
            letter-spacing: 1px;
            transition: color 0.2s ease, transform 0.2s ease;
            text-align: center;
        }

        .side-menu-links a:hover {
            color: #fff;
            transform: scale(1.05);
        }

        .lang-modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .lang-modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .lang-modal-content {
            background: rgba(20, 20, 20, 0.95);
            border: 1px solid #444;
            border-radius: 12px;
            padding: 30px;
            width: 90%;
            max-width: 650px;
            text-align: center;
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }

        .lang-modal-close {
            position: absolute;
            top: 15px;
            right: 20px;
            background: none;
            border: none;
            color: #aaa;
            font-size: 24px;
            cursor: pointer;
            transition: color 0.2s;
        }

        .lang-modal-close:hover {
            color: #fff;
        }

        .lang-modal-title {
            font-size: 1.2rem;
            letter-spacing: 2px;
            margin-bottom: 25px;
            color: #fff;
            text-transform: uppercase;
        }

        .flags-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            justify-items: center;
            max-height: 60vh;
            overflow-y: auto;
            padding-right: 5px;
        }

        .flags-grid::-webkit-scrollbar {
            width: 6px;
        }
        .flags-grid::-webkit-scrollbar-thumb {
            background: #444;
            border-radius: 3px;
        }

        .flag-option {
            background: #222;
            border: 1px solid #444;
            border-radius: 8px;
            padding: 10px;
            width: 100%;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            transition: transform 0.2s ease, border-color 0.2s ease, background 0.2s ease;
        }

        .flag-option:hover {
            transform: translateY(-3px);
            border-color: #777;
            background: #2a2a2a;
        }

        .flag-option img {
            width: 54px;
            height: 36px;
            object-fit: cover;
            border-radius: 4px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }

        .flag-option span {
            font-size: 0.8rem;
            color: #ddd;
            font-weight: bold;
        }

        .page-container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 160px 20px 100px 20px;
            text-align: left;
            min-height: 80vh;
        }

        .page-container h1 {
            font-size: 42px;
            letter-spacing: 2px;
            margin-bottom: 30px;
            color: #fff;
            text-transform: uppercase;
            text-align: left;
        }

        #globe-container {
            width: 100%;
            max-width: 800px;
            height: 500px;
            margin: 0 auto 25px auto;
            border-radius: 4px;
            background: #000;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .city-label {
            font-size: 10px;
            color: #ffffff;
            background: rgba(0, 0, 0, 0.75);
            padding: 2px 6px;
            border-radius: 3px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            white-space: nowrap;
            pointer-events: none;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }

        .search-container {
            width: 100%;
            max-width: 800px;
            margin: 0 auto 30px auto;
        }

        #organization-search {
            width: 100%;
            padding: 14px 20px;
            background: #111;
            border: 1px solid #333;
            color: #fff;
            border-radius: 4px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        #organization-search:focus {
            border-color: #666;
        }

        footer{
            text-align:center;
            padding:40px;
            background:#111;
        }

        .footer-brand {
            margin-top: 10px;
            font-size: 1.1rem;
            letter-spacing: 2px;
            color: #aaa;
        }
    </style>
</head>
<body>

<nav>
    <button class="logo-btn" id="logoToggle" title="Select Nation / Language">☪︎</button>
    <button class="menu-btn" id="menuToggle" title="Open Navigation Menu">
        <span></span>
        <span></span>
        <span></span>
    </button>
</nav>

<div class="side-menu-overlay" id="sideMenuOverlay"></div>
<div class="side-menu" id="sideMenu">
    <div class="side-menu-header">
        <button class="side-menu-close" id="closeSideMenu">&times;</button>
    </div>
    <div class="side-menu-links">
        <a href="index.html" data-translate="menu_home">Home</a>
        <a href="mission.html" data-translate="menu_mission">Mission</a>
        <a href="get-active.html" data-translate="menu_get_active">Get Active</a>
        <a href="#" data-translate="menu_donate">Donate</a>
    </div>
</div>

<div class="lang-modal-overlay" id="langModal">
    <div class="lang-modal-content">
        <button class="lang-modal-close" id="closeModal">&times;</button>
        <div class="lang-modal-title">Select Your Language or Nation</div>
        <div class="flags-grid">
            <div class="flag-option" onclick="setLanguage('en')">
                <img src="https://flagcdn.com/w80/us.png" alt="English">
                <span>English</span>
            </div>
            <div class="flag-option" onclick="setLanguage('ar')">
                <img src="https://flagcdn.com/w80/sa.png" alt="Saudi Arabia">
                <span>Saudi Arabia</span>
            </div>
            <div class="flag-option" onclick="setLanguage('ur')">
                <img src="https://flagcdn.com/w80/pk.png" alt="Pakistan">
                <span>Pakistan</span>
            </div>
            <div class="flag-option" onclick="setLanguage('bn')">
                <img src="https://flagcdn.com/w80/bd.png" alt="Bangladesh">
                <span>Bangladesh</span>
            </div>
            <div class="flag-option" onclick="setLanguage('bs')">
                <img src="https://flagcdn.com/w80/ba.png" alt="Bosnia">
                <span>Bosnia</span>
            </div>
            <div class="flag-option" onclick="setLanguage('tr')">
                <img src="https://flagcdn.com/w80/tr.png" alt="Turkey">
                <span>Turkey</span>
            </div>
            <div class="flag-option" onclick="setLanguage('ar-eg')">
                <img src="https://flagcdn.com/w80/eg.png" alt="Egypt">
                <span>Egypt</span>
            </div>
            <div class="flag-option" onclick="setLanguage('id')">
                <img src="https://flagcdn.com/w80/id.png" alt="Indonesia">
                <span>Indonesia</span>
            </div>
            <div class="flag-option" onclick="setLanguage('sq')">
                <img src="https://flagcdn.com/w80/al.png" alt="Albania">
                <span>Albania</span>
            </div>
            <div class="flag-option" onclick="setLanguage('so')">
                <img src="https://flagcdn.com/w80/so.png" alt="Somalia">
                <span>Somalia</span>
            </div>
            <div class="flag-option" onclick="setLanguage('en-ng')">
                <img src="https://flagcdn.com/w80/ng.png" alt="Nigeria">
                <span>Nigeria</span>
            </div>
            <div class="flag-option" onclick="setLanguage('ps')">
                <img src="https://flagcdn.com/w80/af.png" alt="Afghanistan">
                <span>Afghanistan</span>
            </div>
        </div>
    </div>
</div>

<div class="page-container">
    <h1 data-translate="active_title">Get Active</h1>

    <div id="globe-container"></div>

    <div class="search-container">
        <input type="text" id="organization-search" placeholder="Search for Organizations...">
    </div>
</div>

<footer>
    <div><span data-translate="footer_text">Copyright © 2026 https://akhi076.github.io/islamicist-website/ All Rights Reserved.</span></div>
    <div class="footer-brand">𝐊𝐇𝐈𝐋𝐀𝐅𝐀𝐇</div>
</footer>

<script>
    const menuToggle = document.getElementById('menuToggle');
    const sideMenu = document.getElementById('sideMenu');
    const sideMenuOverlay = document.getElementById('sideMenuOverlay');
    const closeSideMenu = document.getElementById('closeSideMenu');

    function openMenu() {
        sideMenu.classList.add('active');
        sideMenuOverlay.classList.add('active');
    }

    function closeMenu() {
        sideMenu.classList.remove('active');
        sideMenuOverlay.classList.remove('active');
    }

    menuToggle.addEventListener('click', openMenu);
    closeSideMenu.addEventListener('click', closeMenu);
    sideMenuOverlay.addEventListener('click', closeMenu);

    document.querySelectorAll('.side-menu-links a').forEach(link => {
        link.addEventListener('click', closeMenu);
    });

    const logoToggle = document.getElementById('logoToggle');
    const langModal = document.getElementById('langModal');
    const closeModal = document.getElementById('closeModal');

    logoToggle.addEventListener('click', () => {
        langModal.classList.add('active');
    });

    closeModal.addEventListener('click', () => {
        langModal.classList.remove('active');
    });

    langModal.addEventListener('click', (e) => {
        if (e.target === langModal) {
            langModal.classList.remove('active');
        }
    });

    const container = document.getElementById('globe-container');
    
    const majorCities = [
        { name: "Makkah", lat: 21.3891, lng: 39.8579 },
        { name: "Madinah", lat: 24.5247, lng: 39.5692 },
        { name: "Riyadh", lat: 24.7136, lng: 46.6753 },
        { name: "Cairo", lat: 30.0444, lng: 31.2357 },
        { name: "Istanbul", lat: 41.0082, lng: 28.9784 },
        { name: "Ankara", lat: 39.9334, lng: 32.8597 },
        { name: "Dubai", lat: 25.2048, lng: 55.2708 },
        { name: "Baghdad", lat: 33.3152, lng: 44.3661 },
        { name: "Islamabad", lat: 33.6844, lng: 73.0479 },
        { name: "Karachi", lat: 24.8607, lng: 67.0011 },
        { name: "Jakarta", lat: -6.2088, lng: 106.8456 },
        { name: "Kuala Lumpur", lat: 3.1390, lng: 101.6869 },
        { name: "London", lat: 51.5074, lng: -0.1278 },
        { name: "New York", lat: 40.7128, lng: -74.0060 },
        { name: "Paris", lat: 48.8566, lng: 2.3522 },
        { name: "Berlin", lat: 52.5200, lng: 13.4050 },
        { name: "Tokyo", lat: 35.6762, lng: 139.6503 }
    ];

    const worldGlobe = Globe()
        (container)
        // High-resolution Google Earth style satellite map imagery texture
        .globeImageUrl('https://cdn.jsdelivr.net/npm/three-globe/example/img/earth-blue-marble.jpg')
        .bumpImageUrl('https://cdn.jsdelivr.net/npm/three-globe/example/img/earth-topology.png')
        .polygonCapColor(() => 'rgba(0, 0, 0, 0)') // transparent so satellite view shows fully
        .polygonSideColor(() => 'rgba(255, 255, 255, 0.05)')
        .polygonStrokeColor(() => 'rgba(255, 255, 255, 0.2)')
        .htmlElementsData(majorCities)
        .htmlLat(d => d.lat)
        .htmlLng(d => d.lng)
        .htmlElement(d => {
            const el = document.createElement('div');
            el.innerHTML = `<div class="city-label">${d.name}</div>`;
            return el;
        });

    fetch('https://raw.githubusercontent.com/vasturiano/globe.gl/master/example/datasets/ne_110m_admin_0_countries.geojson')
        .then(res => res.json())
        .then(countries => {
            worldGlobe.polygonsData(countries.features);
        });

    worldGlobe.controls().autoRotate = true;
    worldGlobe.controls().autoRotateSpeed = 0.5;
    worldGlobe.controls().enableZoom = true;
    worldGlobe.pointOfView({ altitude: 2.2 });

    const translations = {
        en: {
            menu_home: "Home",
            menu_mission: "Mission",
            menu_get_active: "Get Active",
            menu_donate: "Donate",
            active_title: "Get Active",
            footer_text: "Copyright © 2026 https://akhi076.github.io/islamicist-website/ All Rights Reserved."
        },
        ar: {
            menu_home: "الرئيسية",
            menu_mission: "المهمة",
            menu_get_active: "انخرط معنا",
            menu_donate: "تبرع",
            active_title: "انخرط معنا",
            footer_text: "حقوق الطبع والنشر © 2026 https://akhi076.github.io/islamicist-website/ جميع الحقوق محفوظة."
        },
        ur: {
            menu_home: "ہوم",
            menu_mission: "مشن",
            menu_get_active: "سرگرم ہو جائیں",
            menu_donate: "عطیہ دیں",
            active_title: "سرگرم ہو جائیں",
            footer_text: "کاپی رائٹ © 2026 https://akhi076.github.io/islamicist-website/ تمام حقوق محفوظ ہیں۔"
        },
        bn: {
            menu_home: "হোম",
            menu_mission: "মিশন",
            menu_get_active: "যুক্ত হোন",
            menu_donate: "দান করুন",
            active_title: "যুক্ত হোন",
            footer_text: "স্বত্বাধিকার © 2026 https://akhi076.github.io/islamicist-website/ সর্বস্বত্ব সংরক্ষিত।"
        },
        bs: {
            menu_home: "Početna",
            menu_mission: "Misija",
            menu_get_active: "Uključi se",
            menu_donate: "Doniraj",
            active_title: "Uključi se",
            footer_text: "Autorska prava © 2026 https://akhi076.github.io/islamicist-website/ Sva prava zadržana."
        },
        tr: {
            menu_home: "Ana Sayfa",
            menu_mission: "Misyon",
            menu_get_active: "Aktif Ol",
            menu_donate: "Bağış Yap",
            active_title: "Aktif Ol",
            footer_text: "Telif Hakkı © 2026 https://akhi076.github.io/islamicist-website/ Tüm Hakları Saklıdır."
        },
        'ar-eg': {
            menu_home: "الرئيسية",
            menu_mission: "المهمة",
            menu_get_active: "شارك معانا",
            menu_donate: "تبرع",
            active_title: "شارك معانا",
            footer_text: "جميع الحقوق محفوظة © 2026 https://akhi076.github.io/islamicist-website/"
        },
        id: {
            menu_home: "Beranda",
            menu_mission: "Misi",
            menu_get_active: "Bergabung",
            menu_donate: "Donasi",
            active_title: "Bergabung",
            footer_text: "Hak Cipta © 2026 https://akhi076.github.io/islamicist-website/ Seluruh Hak Cipta Dilindungi Undang-Undang."
        },
        sq: {
            menu_home: "Kryefaqja",
            menu_mission: "Misioni",
            menu_get_active: "Bëhu Aktiv",
            menu_donate: "Dhuroni",
            active_title: "Bëhu Aktiv",
            footer_text: "Të drejtat e autorit © 2026 https://akhi076.github.io/islamicist-website/ Të gjitha të drejtat e rezervuara."
        },
        so: {
            menu_home: "Bogga Hore",
            menu_mission: "Hadafka",
            menu_get_active: "Firfircoonaow",
            menu_donate: "Deeq Bixi",
            active_title: "Firfircoonaow",
            footer_text: "Xuquuqda Daabacaadda © 2026 https://akhi076.github.io/islamicist-website/ Xuquuqda oo dhan waa la dhowray."
        },
        'en-ng': {
            menu_home: "Home",
            menu_mission: "Mission",
            menu_get_active: "Get Active",
            menu_donate: "Donate",
            active_title: "Get Active",
            footer_text: "Copyright © 2026 https://akhi076.github.io/islamicist-website/ All Rights Reserved."
        },
        ps: {
            menu_home: "کور پاڼه",
            menu_mission: "مأموریت",
            menu_get_active: "فعال شئ",
            menu_donate: "مرسته وکړئ",
            active_title: "فعال شئ",
            footer_text: "د کاپی حق © 2026 https://akhi076.github.io/islamicist-website/ ټول حقونه خوندي دي."
        }
    };

    function setLanguage(lang) {
        const data = translations[lang];
        if (!data) return;

        if (lang === 'ar' || lang === 'ur' || lang === 'ar-eg' || lang === 'so' || lang === 'ps') {
            document.documentElement.setAttribute('dir', 'rtl');
        } else {
            document.documentElement.setAttribute('dir', 'ltr');
        }

        document.querySelectorAll('[data-translate]').forEach(el => {
            const key = el.getAttribute('data-translate');
            if (data[key]) {
                el.innerHTML = data[key];
            }
        });

        langModal.classList.remove('active');
    }
</script>

</body>
</html>
