<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get Active - islamicist</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background:black;
            color:white;
        }

        nav{
            position:fixed;
            width:100%;
            padding:20px 50px;
            display:flex;
            justify-content:space-between;
            align-items: center;
            background: #1a1a1a;
            z-index:1000;
            border-bottom: 1px solid #333;
        }

        .logo-btn {
            background: none;
            border: none;
            cursor: pointer;
            color: white;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s ease;
        }

        .logo-btn:hover {
            transform: scale(1.1);
        }

        /* Hamburger Menu Button Style */
        .menu-btn {
            background: none;
            border: none;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            width: 28px;
            height: 20px;
            padding: 0;
            z-index: 1001;
        }

        .menu-btn span {
            display: block;
            width: 100%;
            height: 2px;
            background-color: white;
            transition: all 0.3s ease;
        }

        /* Side Menu Drawer Styles */
        .side-menu-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 2500;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .side-menu-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .side-menu {
            position: fixed;
            top: 0;
            right: -350px;
            width: 350px;
            height: 100%;
            background: #141414;
            border-left: 1px solid #333;
            z-index: 2600;
            box-shadow: -5px 0 25px rgba(0,0,0,0.8);
            transition: right 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            padding: 30px;
        }

        .side-menu.active {
            right: 0;
        }

        .side-menu-header {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 20px;
        }

        .side-menu-close {
            background: none;
            border: none;
            color: #aaa;
            font-size: 28px;
            cursor: pointer;
            transition: color 0.2s;
        }

        .side-menu-close:hover {
            color: #fff;
        }

        .side-menu-links {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            flex-grow: 1;
            padding: 20px 0 40px 0;
            overflow-y: auto;
            text-align: center;
        }

        .side-menu-links a {
            color: #ddd;
            text-decoration: none;
            font-size: 1.1rem;
            font-weight: 500;
            letter-spacing: 1px;
            transition: color 0.2s ease, transform 0.2s ease;
            text-align: center;
        }

        .side-menu-links a:hover {
            color: #fff;
            transform: scale(1.05);
        }

        /* Page Content Area (Ready for your design) */
        .page-container {
            max-width: 900px;
            margin: 0 auto;
            padding: 160px 20px 100px 20px;
            text-align: left;
            min-height: 80vh;
        }

        .page-container h1 {
            font-size: 42px;
            letter-spacing: 2px;
            margin-bottom: 30px;
            color: #fff;
            text-transform: uppercase;
        }

        footer{
            text-align:center;
            padding:40px;
            background:#111;
        }

        .footer-brand {
            margin-top: 10px;
            font-size: 1.1rem;
            letter-spacing: 2px;
            color: #aaa;
        }
    </style>
</head>
<body>

<nav>
    <button class="logo-btn" onclick="window.location.href='index.html'" title="Home">☪︎</button>
    <button class="menu-btn" id="menuToggle" title="Open Navigation Menu">
        <span></span>
        <span></span>
        <span></span>
    </button>
</nav>

<!-- Side Navigation Menu Drawer -->
<div class="side-menu-overlay" id="sideMenuOverlay"></div>
<div class="side-menu" id="sideMenu">
    <div class="side-menu-header">
        <button class="side-menu-close" id="closeSideMenu">&times;</button>
    </div>
    <div class="side-menu-links">
        <a href="index.html">Home</a>
        <a href="mission.html">Mission</a>
        <a href="get-active.html">Get Active</a>
        <a href="#">Donate</a>
    </div>
</div>

<!-- EMPTY CONTAINER FOR YOU TO DESIGN -->
<div class="page-container">
    <h1>Get Active</h1>
    <p>Add your text, images, or elements here...</p>
</div>

<footer>
    <div><span>Copyright © 2026 https://akhi076.github.io/islamicist-website/ All Rights Reserved.</span></div>
    <div class="footer-brand">𝐊𝐇𝐈𝐋𝐀𝐅𝐀𝐇</div>
</footer>

<script>
    const menuToggle = document.getElementById('menuToggle');
    const sideMenu = document.getElementById('sideMenu');
    const sideMenuOverlay = document.getElementById('sideMenuOverlay');
    const closeSideMenu = document.getElementById('closeSideMenu');

    function openMenu() {
        sideMenu.classList.add('active');
        sideMenuOverlay.classList.add('active');
    }

    function closeMenu() {
        sideMenu.classList.remove('active');
        sideMenuOverlay.classList.remove('active');
    }

    menuToggle.addEventListener('click', openMenu);
    closeSideMenu.addEventListener('click', closeMenu);
    sideMenuOverlay.addEventListener('click', closeMenu);

    document.querySelectorAll('.side-menu-links a').forEach(link => {
        link.addEventListener('click', closeMenu);
    });
</script>

</body>
</html>
